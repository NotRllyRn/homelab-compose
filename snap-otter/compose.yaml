services:
  snapotter:
    container_name: SnapOtter
    volumes:
      - ./data:/data
    image: snapotter/snapotter:latest
    networks:
      lan_net:
        ipv4_address: ${SNAPOTTER_IPV4_ADDRESS}
    mem_limit: 6g
    memswap_limit: 6g
    restart: unless-stopped
networks:
  lan_net:
    external: true
    name: lan_net
