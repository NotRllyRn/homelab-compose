services:
  app:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    environment:
      DB_MYSQL_HOST: db
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: ${MYSQL_USER}
      DB_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DB_MYSQL_NAME: ${MYSQL_DATABASE}
    volumes:
      - ${NPM_DATA_PATH}/data:/data
      - ${NPM_DATA_PATH}/letsencrypt:/etc/letsencrypt
    depends_on:
      - db
    networks:
      npm_backend: {}
      lan_net:
        ipv4_address: ${NPM_IPV4_ADDRESS}
      proxy_backend: {}
    mem_limit: 1g
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    # Tailscale joins NPM's namespace.
    network_mode: service:app
    environment:
      TS_HOSTNAME: npm-01
      TS_AUTHKEY: ${TAILSCALE_OAUTH_SECRET}?ephemeral=false
      TS_EXTRA_ARGS: --advertise-tags=tag:container
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
      TS_USERSPACE: "false"
    volumes:
      - ${NPM_DATA_PATH}/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - app
    mem_limit: 256m
  db:
    image: jc21/mariadb-aria:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - ${NPM_DATA_PATH}/mysql:/var/lib/mysql
    networks:
      - npm_backend
    mem_limit: 1g
networks:
  npm_backend:
    driver: bridge
    internal: true
  lan_net:
    external: true
    name: lan_net
  proxy_backend:
    external: true
    name: proxy_backend
